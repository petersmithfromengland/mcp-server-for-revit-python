# ── Revit MCP Server Configuration ──────────────────────────────────
#
# This file controls external library paths and settings.
# Edit the paths below to match your environment.

# When false (default), all code must go through a preparation step
# (execute_stem, compose_external_stem, or prepare_code) that surfaces
# the code to the user for review before it can be executed.
#
# When true, the LLM can execute arbitrary code directly via
# execute_revit_code without needing user approval first.
allow_implicit_code_execution: false

external_stems:
  # External Python libraries to index as external stems.
  # Each entry needs:
  #   name:    Display name used in tool output and cache filenames
  #   path:    Absolute path to the library's root Python package
  #   enabled: Set to false to skip indexing this library
  libraries:
    - name: duHast
      path: "C:\\Program Files\\Python311\\Lib\\site-packages\\duHast"
      enabled: true

  # Revit API XML documentation file (shipped with Revit SDK).
  # Provides class, method, property, enum, and field signatures.
  revit_api_xml: "tools/RevitAPI.xml"
